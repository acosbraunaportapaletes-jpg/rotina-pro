{% extends "base.html" %}
{% block title %}Clientes - RotinaPro{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Clientes</h1>
    <button onclick="document.getElementById('new-client-form').classList.toggle('hidden')"
        class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm transition">+ Novo cliente</button>
</div>

<!-- New client form -->
<form id="new-client-form" class="hidden glass rounded-xl p-6 mb-6 space-y-4"
    hx-post="/clients" hx-target="#client-list" hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()">
    <div class="grid md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm text-slate-400 mb-1">Nome *</label>
            <input type="text" name="name" required
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Telefone</label>
            <input type="text" name="phone"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Email</label>
            <input type="email" name="email"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Notas</label>
            <input type="text" name="notes"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
    </div>
    <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-lg text-sm transition">Salvar</button>
</form>

<!-- Client list -->
<div id="client-list">
    {% include "partials/client_list.html" %}
</div>
{% endblock %}
