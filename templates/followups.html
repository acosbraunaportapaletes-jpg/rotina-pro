{% extends "base.html" %}
{% block title %}Follow-ups - RotinaPro{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Follow-ups</h1>
    <button onclick="document.getElementById('new-followup-form').classList.toggle('hidden')"
        class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm transition">+ Novo follow-up</button>
</div>

<!-- New followup form -->
<form id="new-followup-form" class="hidden glass rounded-xl p-6 mb-6 space-y-4"
    hx-post="/followups" hx-target="#followup-list" hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()">
    <div class="grid md:grid-cols-3 gap-4">
        <div>
            <label class="block text-sm text-slate-400 mb-1">Cliente *</label>
            <select name="client_id" required
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
                <option value="">Selecione...</option>
                {% for c in clients %}
                <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Data *</label>
            <input type="date" name="due_date" required
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Nota</label>
            <input type="text" name="note" placeholder="Ex: retornar sobre proposta"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
    </div>
    <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-lg text-sm transition">Criar</button>
</form>

<!-- Filters -->
<div class="flex gap-2 mb-4 text-sm">
    <a href="/followups" class="px-3 py-1 rounded-lg transition {% if not status_filter %}bg-emerald-600{% else %}bg-slate-700 hover:bg-slate-600{% endif %}">Todos</a>
    <a href="/followups?status=pending" class="px-3 py-1 rounded-lg transition {% if status_filter == 'pending' %}bg-emerald-600{% else %}bg-slate-700 hover:bg-slate-600{% endif %}">Pendentes</a>
    <a href="/followups?status=overdue" class="px-3 py-1 rounded-lg transition {% if status_filter == 'overdue' %}bg-red-700{% else %}bg-slate-700 hover:bg-slate-600{% endif %}">Atrasados</a>
    <a href="/followups?status=done" class="px-3 py-1 rounded-lg transition {% if status_filter == 'done' %}bg-emerald-600{% else %}bg-slate-700 hover:bg-slate-600{% endif %}">Feitos</a>
</div>

<!-- Follow-up list -->
<div id="followup-list">
    {% include "partials/followup_list.html" %}
</div>
{% endblock %}
