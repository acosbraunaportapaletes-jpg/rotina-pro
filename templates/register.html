{% extends "base.html" %}
{% block title %}Criar conta - RotinaPro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-center">Criar conta</h2>
    <form method="POST" action="/register" class="glass rounded-xl p-6 space-y-4">
        <div>
            <label class="block text-sm text-slate-400 mb-1">Nome do negocio</label>
            <input type="text" name="biz_name" placeholder="Ex: Barbearia do João"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Email</label>
            <input type="email" name="email" required
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Senha (min. 6 caracteres)</label>
            <input type="password" name="password" required minlength="6"
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-semibold transition">
            Criar conta gratis
        </button>
    </form>
    <p class="text-center text-sm text-slate-400 mt-4">
        Ja tem conta? <a href="/login" class="text-emerald-400 hover:underline">Fazer login</a>
    </p>
</div>
{% endblock %}
