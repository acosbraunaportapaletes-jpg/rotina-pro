{% extends "base.html" %}
{% block title %}Login - RotinaPro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-center">Entrar</h2>
    <form method="POST" action="/login" class="glass rounded-xl p-6 space-y-4">
        <div>
            <label class="block text-sm text-slate-400 mb-1">Email</label>
            <input type="email" name="email" required
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Senha</label>
            <input type="password" name="password" required
                class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-emerald-500 focus:outline-none">
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-semibold transition">
            Entrar
        </button>
    </form>
    <p class="text-center text-sm text-slate-400 mt-4">
        Nao tem conta? <a href="/register" class="text-emerald-400 hover:underline">Criar conta</a>
    </p>
</div>
{% endblock %}
